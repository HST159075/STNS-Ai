services:
  - type: web
    name: stns-ai-backend
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        value: https://stns-ai-backend.onrender.com/api/auth
      - key: FRONTEND_URL
        value: https://stnc-ai-frontend.onrender.com
      - key: PORT
        value: 10000
